<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Work Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0a0a;
      --surface:     #111111;
      --raised:      #191919;
      --border:      #222222;
      --border-mid:  #2e2e2e;
      --text:        #f0f0f0;
      --muted:       #555;
      --muted-mid:   #888;
      --accent:      #4ade80;
      --accent-glow: rgba(74, 222, 128, 0.18);
      --accent-dim:  rgba(74, 222, 128, 0.08);
      --amber:       #f59e0b;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 36px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(14px);
      z-index: 50;
    }

    .header-logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
    .header-logo span { color: var(--accent); }

    .header-alltime { font-size: 13px; color: var(--muted-mid); }
    .header-alltime strong { color: var(--accent); font-weight: 600; }

    /* ── Main layout ── */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 36px 80px;
    }

    /* ── Timer section ── */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 0 56px;
      gap: 20px;
    }

    /* Row: timer display + progress bar side by side */
    .timer-row {
      display: flex;
      align-items: center;
      gap: 36px;
    }

    .timer-display {
      font-size: 100px;
      font-weight: 200;
      letter-spacing: -5px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      color: var(--text);
      transition: color 0.4s, text-shadow 0.4s;
      user-select: none;
    }

    .timer-display.running {
      color: #fff;
      text-shadow: 0 0 80px rgba(74, 222, 128, 0.22);
    }

    /* ── Vertical Progress Bar ── */
    .progress-outer {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 7px;
    }

    .progress-bar {
      display: flex;
      flex-direction: column-reverse; /* seg 0 = 1h at bottom, seg 7 = 8h at top */
      gap: 4px;
      width: 16px;
    }

    .prog-seg {
      position: relative;
      width: 16px;
      height: 27px;
      background: #1c1c1c;
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .prog-seg-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 0%;
      border-radius: 4px;
      transition: height 0.9s cubic-bezier(0.34, 1.3, 0.64, 1);
    }

    .progress-labels {
      display: flex;
      flex-direction: column-reverse; /* label 1h at bottom, 8h at top */
      gap: 4px;
    }

    .prog-label {
      height: 27px;
      display: flex;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      transition: color 0.3s;
      font-variant-numeric: tabular-nums;
    }

    .prog-label.lit { color: var(--muted-mid); }

    /* ── Timer sub / controls ── */
    .timer-sub { font-size: 14px; color: var(--muted-mid); letter-spacing: 0.2px; }
    .timer-sub strong { color: var(--accent); font-weight: 600; }

    .timer-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 11px 28px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-start { background: var(--accent); color: #000; min-width: 120px; }
    .btn-start:hover { background: #6ee7a0; }

    .btn-pause { background: var(--amber); color: #000; min-width: 120px; }
    .btn-pause:hover { background: #fbbf24; }

    .btn-ghost {
      background: var(--raised);
      color: var(--muted-mid);
      border: 1px solid var(--border);
      padding: 11px 20px;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--border-mid); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 32px 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px 24px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -1.2px;
      line-height: 1;
    }

    .stat-value .unit { font-size: 15px; font-weight: 400; color: var(--muted-mid); margin-left: 3px; }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── Chart section ── */
    .chart-section { padding: 32px 0; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--muted);
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .view-btn {
      padding: 5px 13px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: inherit;
      background: transparent;
      color: var(--muted-mid);
      transition: all 0.15s;
      white-space: nowrap;
    }

    .view-btn.active { background: var(--raised); color: var(--text); }

    /* Bar chart */
    .bar-chart-wrap { position: relative; }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 200px;
      padding-bottom: 28px;
      position: relative;
    }

    .bar-chart::after {
      content: '';
      position: absolute;
      bottom: 28px;
      left: 0; right: 0;
      height: 1px;
      background: var(--border);
      pointer-events: none;
    }

    .bar-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
      position: relative;
      cursor: default;
    }

    .bar-item.is-future { opacity: 0.25; pointer-events: none; }

    .bar-fill-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: flex-end;
      position: relative;
    }

    .bar-fill {
      width: 100%;
      background: var(--accent-dim);
      border-radius: 4px 4px 0 0;
      transition: height 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s;
      min-height: 0;
      position: relative;
    }

    .bar-fill.has-data { min-height: 3px; }

    .bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      border-radius: 4px 4px 0 0;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .bar-fill.has-data::after { background: var(--accent); }

    .bar-fill.is-current::after {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
    }

    .bar-item:hover .bar-fill.has-data { background: rgba(74, 222, 128, 0.2); }

    .bar-tip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--raised);
      border: 1px solid var(--border-mid);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 11px;
      white-space: nowrap;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
    }

    .bar-item:hover .bar-tip { opacity: 1; }

    .bar-label {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      text-align: center;
    }

    .bar-label.is-current { color: var(--accent); font-weight: 600; }

    /* ── Heatmap section ── */
    .heatmap-section { padding: 32px 0 0; }

    .heatmap-scroll { overflow-x: auto; padding-bottom: 4px; }

    .heatmap-month-row { display: flex; gap: 3px; margin-bottom: 5px; }

    .heatmap-month-cell {
      width: 13px;
      flex-shrink: 0;
      font-size: 10px;
      color: var(--muted-mid);
      white-space: nowrap;
      overflow: visible;
    }

    .heatmap-grid { display: flex; gap: 3px; }

    .heatmap-col { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }

    .cell {
      width: 13px;
      height: 13px;
      border-radius: 2px;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
      transition: opacity 0.12s;
    }

    .cell:hover { opacity: 0.75; }
    .cell.future { opacity: 0; pointer-events: none; }
    .cell[data-lvl="0"] { background: #1c1c1c; }
    .cell[data-lvl="1"] { background: #14532d; }
    .cell[data-lvl="2"] { background: #166534; }
    .cell[data-lvl="3"] { background: #15803d; }
    .cell[data-lvl="4"] { background: #22c55e; }
    .cell[data-lvl="5"] { background: #4ade80; }

    .heatmap-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .heatmap-legend { display: flex; align-items: center; gap: 5px; }
    .legend-text { font-size: 11px; color: var(--muted); }
    .legend-cells { display: flex; gap: 3px; }
    .legend-cell { width: 12px; height: 12px; border-radius: 2px; }
    .legend-cell[data-lvl="0"] { background: #1c1c1c; }
    .legend-cell[data-lvl="1"] { background: #14532d; }
    .legend-cell[data-lvl="2"] { background: #166534; }
    .legend-cell[data-lvl="3"] { background: #15803d; }
    .legend-cell[data-lvl="4"] { background: #22c55e; }
    .legend-cell[data-lvl="5"] { background: #4ade80; }
    .heatmap-scale { font-size: 11px; color: var(--muted); }

    /* ── Floating tooltip ── */
    #ftip {
      position: fixed;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 1000;
      white-space: nowrap;
    }

    #ftip.show { opacity: 1; }
    #ftip .tip-time { color: var(--accent); font-weight: 600; }
    #ftip .tip-date { color: var(--muted-mid); font-size: 11px; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .header { padding: 0 20px; }
      .main { padding: 0 20px 60px; }
      .timer-display { font-size: 64px; letter-spacing: -3px; }
      .timer-row { gap: 20px; }
      .prog-seg { height: 20px; }
      .prog-label { height: 20px; }
      .stats-row { grid-template-columns: 1fr; }
      .timer-section { padding: 40px 0 36px; }
    }
  </style>
</head>
<body>

<div id="ftip">
  <div class="tip-time" id="ftip-time"></div>
  <div class="tip-date" id="ftip-date"></div>
</div>

<header class="header">
  <div class="header-logo">Deep <span>Work</span></div>
  <div class="header-alltime">All-time &mdash; <strong id="alltime-val">0h 0m</strong></div>
</header>

<main class="main">

  <!-- Timer -->
  <div class="timer-section">
    <div class="timer-row">
      <div class="timer-display" id="timer-disp">00:00:00</div>
      <!-- Vertical progress bar -->
      <div class="progress-outer">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-labels" id="progress-labels"></div>
      </div>
    </div>
    <div class="timer-sub">Today: <strong id="today-val">0h 0m</strong></div>
    <div class="timer-controls">
      <button class="btn btn-start" id="main-btn">Start</button>
      <button class="btn btn-ghost" id="reset-btn">Reset</button>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="s-today-h">0<span class="unit">h</span></div>
      <div class="stat-sub" id="s-today-m">0 min total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="s-week-h">0<span class="unit">h</span></div>
      <div class="stat-sub" id="s-week-avg">0.0h avg / day</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best Day</div>
      <div class="stat-value" id="s-best-h">0<span class="unit">h</span></div>
      <div class="stat-sub" id="s-best-date">—</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Bar chart -->
  <div class="chart-section">
    <div class="section-header">
      <span class="section-title">Focus Hours</span>
      <div class="view-toggle">
        <button class="view-btn active" data-v="weekly">Weekly</button>
        <button class="view-btn" data-v="monthly">Monthly</button>
        <button class="view-btn" data-v="yearly">Yearly</button>
        <button class="view-btn" data-v="alltime">All-time</button>
      </div>
    </div>
    <div class="bar-chart-wrap">
      <div class="bar-chart" id="bar-chart"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Heatmap -->
  <div class="heatmap-section">
    <div class="section-header">
      <span class="section-title">History</span>
    </div>
    <div class="heatmap-scroll">
      <div class="heatmap-month-row" id="hm-months"></div>
      <div class="heatmap-grid" id="hm-grid"></div>
    </div>
    <div class="heatmap-footer">
      <div class="heatmap-legend">
        <span class="legend-text">Less</span>
        <div class="legend-cells">
          <div class="legend-cell" data-lvl="0"></div>
          <div class="legend-cell" data-lvl="1"></div>
          <div class="legend-cell" data-lvl="2"></div>
          <div class="legend-cell" data-lvl="3"></div>
          <div class="legend-cell" data-lvl="4"></div>
          <div class="legend-cell" data-lvl="5"></div>
        </div>
        <span class="legend-text">More</span>
      </div>
      <span class="heatmap-scale">0h &rarr; 1h &rarr; 2h &rarr; 4h &rarr; 6h &rarr; 8h+</span>
    </div>
  </div>

</main>

<script>
// ─────────────────────────────────────────────────────────────────
// Storage
// ─────────────────────────────────────────────────────────────────
const KEY = 'dw_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch { return {}; }
}

function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

function todayKey() { return new Date().toISOString().slice(0, 10); }

// Commit only the NEW seconds since last commit — keeps elapsed intact
function commitSession() {
  const newSecs = elapsed - committed;
  if (newSecs <= 0) return;
  const d = load();
  const k = todayKey();
  d[k] = (d[k] || 0) + newSecs;
  save(d);
  committed = elapsed;
}

// ─────────────────────────────────────────────────────────────────
// Timer State
// ─────────────────────────────────────────────────────────────────
let elapsed   = 0;   // total seconds on current session clock (never reset on pause)
let committed = 0;   // how much of elapsed has been written to localStorage
let running   = false;
let ticker    = null;

const dispEl   = document.getElementById('timer-disp');
const mainBtn  = document.getElementById('main-btn');
const resetBtn = document.getElementById('reset-btn');

function pad(n) { return String(n).padStart(2, '0'); }

function fmtClock(s) {
  return pad(Math.floor(s / 3600)) + ':' + pad(Math.floor(s % 3600 / 60)) + ':' + pad(s % 60);
}

function fmtHM(s) {
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60);
  if (h === 0 && m === 0) return '0m';
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

function tick() {
  elapsed++;
  dispEl.textContent = fmtClock(elapsed);
  // Live stats + progress bar every second
  refreshLive();
  // Commit every 60s so progress survives unexpected closes
  if (elapsed % 60 === 0) commitSession();
}

// Start OR Resume
mainBtn.addEventListener('click', () => {
  if (!running) {
    running = true;
    dispEl.classList.add('running');
    mainBtn.textContent = elapsed > 0 ? 'Pause' : 'Pause';
    mainBtn.className = 'btn btn-pause';
    ticker = setInterval(tick, 1000);
  } else {
    // Pause — freeze timer, keep elapsed
    clearInterval(ticker);
    ticker = null;
    running = false;
    dispEl.classList.remove('running');
    commitSession();             // save progress so far
    mainBtn.textContent = 'Resume';
    mainBtn.className = 'btn btn-start';
    renderAll();
  }
});

// Reset — commit whatever remains, then wipe the clock
resetBtn.addEventListener('click', () => {
  if (running) {
    clearInterval(ticker);
    ticker = null;
    running = false;
  }
  commitSession();
  elapsed   = 0;
  committed = 0;
  dispEl.classList.remove('running');
  dispEl.textContent = fmtClock(0);
  mainBtn.textContent = 'Start';
  mainBtn.className = 'btn btn-start';
  renderAll();
});

// Save on tab close / navigate away
window.addEventListener('beforeunload', commitSession);

// ─────────────────────────────────────────────────────────────────
// Live helpers
// ─────────────────────────────────────────────────────────────────
// Returns total seconds for a given date key, including any
// uncommitted live elapsed if the key is today.
function liveSecs(data, key) {
  return (data[key] || 0) + (key === todayKey() ? (elapsed - committed) : 0);
}

function refreshLive() {
  const data = load();
  const s = liveSecs(data, todayKey());
  document.getElementById('today-val').textContent = fmtHM(s);
  document.getElementById('s-today-h').innerHTML = Math.floor(s / 3600) + '<span class="unit">h</span>';
  document.getElementById('s-today-m').textContent = Math.floor(s / 60) + ' min total';
  updateAlltime(data);
  updateProgressBar(data);
  if (elapsed % 30 === 0) renderBarChart(currentView);
}

function updateStats(data) {
  const tk = todayKey();
  const todaySecs = liveSecs(data, tk);

  document.getElementById('s-today-h').innerHTML = Math.floor(todaySecs / 3600) + '<span class="unit">h</span>';
  document.getElementById('s-today-m').textContent = Math.floor(todaySecs / 60) + ' min total';

  // This week (Sun–Sat)
  const now = new Date();
  const dow = now.getDay();
  let weekSecs = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - dow + i);
    if (d > now) break;
    weekSecs += liveSecs(data, d.toISOString().slice(0, 10));
  }
  document.getElementById('s-week-h').innerHTML = Math.floor(weekSecs / 3600) + '<span class="unit">h</span>';
  document.getElementById('s-week-avg').textContent =
    (weekSecs / 3600 / 7).toFixed(1) + 'h avg / day';

  // Best day ever
  let bestSecs = 0, bestKey = null;
  for (const [k, s] of Object.entries(data)) {
    const eff = k === tk ? liveSecs(data, k) : s;
    if (eff > bestSecs) { bestSecs = eff; bestKey = k; }
  }
  document.getElementById('s-best-h').innerHTML = Math.floor(bestSecs / 3600) + '<span class="unit">h</span>';
  document.getElementById('s-best-date').textContent = bestKey
    ? new Date(bestKey + 'T00:00:00').toLocaleDateString('en-US',
        { month: 'short', day: 'numeric', year: 'numeric' })
    : '—';
}

function updateAlltime(data) {
  const tk = todayKey();
  const total = Object.entries(data).reduce((acc, [k, s]) =>
    acc + (k === tk ? liveSecs(data, k) : s), 0);
  document.getElementById('alltime-val').textContent = fmtHM(total);
}

// ─────────────────────────────────────────────────────────────────
// Vertical Progress Bar
// ─────────────────────────────────────────────────────────────────
const PROG_COLORS = [
  '#1a4731', // 1h — deepest forest green
  '#14532d', // 2h
  '#15803d', // 3h
  '#16a34a', // 4h
  '#22c55e', // 5h
  '#4ade80', // 6h
  '#86efac', // 7h
  '#bbf7d0', // 8h — brightest mint
];
const PROG_MAX_HOURS = 8;

function buildProgressBar() {
  const bar    = document.getElementById('progress-bar');
  const labels = document.getElementById('progress-labels');
  bar.innerHTML = '';
  labels.innerHTML = '';

  for (let i = 0; i < PROG_MAX_HOURS; i++) {
    // Segment
    const seg = document.createElement('div');
    seg.className = 'prog-seg';
    seg.id = 'pseg-' + i;

    const fill = document.createElement('div');
    fill.className = 'prog-seg-fill';
    fill.id = 'pseg-fill-' + i;
    fill.style.background = PROG_COLORS[i];
    seg.appendChild(fill);
    bar.appendChild(seg);

    // Label (e.g. "1h", "2h" … "8h")
    const lbl = document.createElement('div');
    lbl.className = 'prog-label';
    lbl.id = 'prog-lbl-' + i;
    lbl.textContent = (i + 1) + 'h';
    labels.appendChild(lbl);
  }
}

function updateProgressBar(data) {
  const totalHours = liveSecs(data || load(), todayKey()) / 3600;

  for (let i = 0; i < PROG_MAX_HOURS; i++) {
    const fill = document.getElementById('pseg-fill-' + i);
    const seg  = document.getElementById('pseg-' + i);
    const lbl  = document.getElementById('prog-lbl-' + i);
    if (!fill) continue;

    const segStart = i;
    const segEnd   = i + 1;
    let pct;

    if (totalHours >= segEnd) {
      pct = 100;
    } else if (totalHours > segStart) {
      pct = (totalHours - segStart) * 100;
    } else {
      pct = 0;
    }

    fill.style.height = pct + '%';

    // Glow on the currently-filling segment
    if (pct > 0 && pct < 100) {
      fill.style.boxShadow = '0 0 10px ' + PROG_COLORS[i] + 'aa';
    } else {
      fill.style.boxShadow = 'none';
    }

    if (lbl) lbl.classList.toggle('lit', pct > 0);
  }
}

// ─────────────────────────────────────────────────────────────────
// Bar Chart
// ─────────────────────────────────────────────────────────────────
let currentView = 'weekly';

const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];

function buildBarData(view) {
  const data = load();
  const tk   = todayKey();
  const now  = new Date();

  // ── Weekly: last 7 days ──────────────────────────────────────
  if (view === 'weekly') {
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(now);
      d.setDate(d.getDate() - (6 - i));
      const k = d.toISOString().slice(0, 10);
      const isToday = k === tk;
      return {
        k,
        secs: liveSecs(data, k),
        label: isToday ? 'Today' : d.toLocaleDateString('en-US', { weekday: 'short' }),
        isCurrent: isToday,
      };
    });
  }

  // ── Monthly: last 30 days ────────────────────────────────────
  if (view === 'monthly') {
    return Array.from({ length: 30 }, (_, i) => {
      const d = new Date(now);
      d.setDate(d.getDate() - (29 - i));
      const k = d.toISOString().slice(0, 10);
      const isToday = k === tk;
      let label = '';
      if (isToday) label = 'Today';
      else if (i === 0 || i % 5 === 0)
        label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return { k, secs: liveSecs(data, k), label, isCurrent: isToday };
    });
  }

  // ── Yearly: 12 months of current year ───────────────────────
  if (view === 'yearly') {
    const yr  = now.getFullYear();
    const cur = now.getMonth(); // 0-indexed
    return MONTHS_SHORT.map((name, m) => {
      const isFuture  = m > cur;
      const isCurrent = m === cur;
      let secs = 0;
      if (!isFuture) {
        for (const [k, s] of Object.entries(data)) {
          if (parseInt(k.slice(0, 4)) === yr &&
              parseInt(k.slice(5, 7)) - 1 === m) {
            secs += k === tk ? liveSecs(data, k) : s;
          }
        }
      }
      return { k: yr + '-' + String(m + 1).padStart(2, '0'), secs, label: name, isCurrent, isFuture };
    });
  }

  // ── All-time: one bar per year ───────────────────────────────
  if (view === 'alltime') {
    const curYear = now.getFullYear();
    const keys    = Object.keys(data);
    const minYear = keys.length
      ? Math.min(...keys.map(k => parseInt(k.slice(0, 4))))
      : curYear;

    const items = [];
    for (let y = minYear; y <= curYear; y++) {
      let secs = 0;
      for (const [k, s] of Object.entries(data)) {
        if (parseInt(k.slice(0, 4)) === y) {
          secs += k === tk ? liveSecs(data, k) : s;
        }
      }
      items.push({ k: String(y), secs, label: String(y), isCurrent: y === curYear });
    }
    return items;
  }

  return [];
}

function renderBarChart(view) {
  const chart = document.getElementById('bar-chart');
  chart.innerHTML = '';
  const items   = buildBarData(view);
  const maxSecs = Math.max(...items.map(x => x.secs), 1);

  items.forEach(({ secs, label, isCurrent, isFuture }) => {
    const item = document.createElement('div');
    item.className = 'bar-item' + (isFuture ? ' is-future' : '');

    const wrap = document.createElement('div');
    wrap.className = 'bar-fill-wrap';

    const fill = document.createElement('div');
    const pct  = (secs / maxSecs) * 100;
    fill.className = 'bar-fill' +
      (secs > 0  ? ' has-data'   : '') +
      (isCurrent ? ' is-current' : '');
    fill.style.height = Math.max(pct, secs > 0 ? 1.5 : 0) + '%';

    const tip = document.createElement('div');
    tip.className   = 'bar-tip';
    tip.textContent = isFuture ? '—' : (secs > 0 ? fmtHM(secs) : 'No sessions');

    fill.appendChild(tip);
    wrap.appendChild(fill);

    const lbl = document.createElement('div');
    lbl.className   = 'bar-label' + (isCurrent ? ' is-current' : '');
    lbl.textContent = label;

    item.appendChild(wrap);
    item.appendChild(lbl);
    chart.appendChild(item);
  });
}

document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.v;
    renderBarChart(currentView);
  });
});

// ─────────────────────────────────────────────────────────────────
// Heatmap
// ─────────────────────────────────────────────────────────────────
function lvl(secs) {
  const h = secs / 3600;
  if (h === 0) return 0;
  if (h <  1)  return 1;
  if (h <  2)  return 2;
  if (h <  4)  return 3;
  if (h <  6)  return 4;
  return 5;
}

function renderHeatmap() {
  const data     = load();
  const tk       = todayKey();
  const grid     = document.getElementById('hm-grid');
  const monthRow = document.getElementById('hm-months');
  grid.innerHTML     = '';
  monthRow.innerHTML = '';

  const today    = new Date();
  const startSun = new Date(today);
  startSun.setDate(startSun.getDate() - startSun.getDay()); // this Sunday
  startSun.setDate(startSun.getDate() - 51 * 7);            // 52 weeks back

  const totalWeeks  = 52;
  const monthLabels = [];
  let lastMonth     = -1;

  for (let w = 0; w < totalWeeks; w++) {
    const col = document.createElement('div');
    col.className = 'heatmap-col';

    for (let d = 0; d < 7; d++) {
      const date = new Date(startSun);
      date.setDate(date.getDate() + w * 7 + d);
      const cell = document.createElement('div');
      cell.className = 'cell';

      if (date > today) {
        cell.classList.add('future');
        cell.setAttribute('data-lvl', '0');
      } else {
        const k    = date.toISOString().slice(0, 10);
        const secs = k === tk ? liveSecs(data, k) : (data[k] || 0);
        cell.setAttribute('data-lvl', lvl(secs));
        cell.setAttribute('data-k', k);
        cell.setAttribute('data-s', secs);
        cell.addEventListener('mouseenter', onCellEnter);
        cell.addEventListener('mouseleave', onCellLeave);
      }

      col.appendChild(cell);

      if (d === 0) {
        const m = date.getMonth();
        if (m !== lastMonth) {
          lastMonth = m;
          monthLabels.push({ w, text: date.toLocaleDateString('en-US', { month: 'short' }) });
        }
      }
    }

    grid.appendChild(col);
  }

  for (let w = 0; w < totalWeeks; w++) {
    const cell  = document.createElement('div');
    cell.className = 'heatmap-month-cell';
    const entry = monthLabels.find(x => x.w === w);
    cell.textContent = entry ? entry.text : '';
    monthRow.appendChild(cell);
  }
}

// Floating tooltip
const ftip     = document.getElementById('ftip');
const ftipTime = document.getElementById('ftip-time');
const ftipDate = document.getElementById('ftip-date');

document.addEventListener('mousemove', e => {
  ftip.style.left = (e.clientX + 14) + 'px';
  ftip.style.top  = (e.clientY - 42) + 'px';
});

function onCellEnter(e) {
  const cell = e.currentTarget;
  const k    = cell.getAttribute('data-k');
  const secs = parseInt(cell.getAttribute('data-s')) || 0;
  ftipTime.textContent = secs > 0 ? fmtHM(secs) : 'No sessions';
  ftipDate.textContent = new Date(k + 'T00:00:00').toLocaleDateString('en-US',
    { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
  ftip.classList.add('show');
}

function onCellLeave() { ftip.classList.remove('show'); }

// ─────────────────────────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────────────────────────
function renderAll() {
  const data = load();
  const s    = liveSecs(data, todayKey());
  document.getElementById('today-val').textContent = fmtHM(s);
  updateStats(data);
  updateAlltime(data);
  updateProgressBar(data);
  renderBarChart(currentView);
  renderHeatmap();
}

buildProgressBar();
renderAll();
</script>
